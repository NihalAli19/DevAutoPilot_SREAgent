name: ML Pipeline

# Train -> evaluate -> GATE. The eval gate (PR-AUC floor in ml/config.py) fails the
# pipeline if the best model regresses below the floor — i.e. a bad model can't pass.
# Registry/deploy of the model is Phase 4 (Azure ML); this slice owns the gate.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # weekly retrain (Mondays 03:00 UTC)
  push:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/ml-pipeline.yml"

concurrency:
  group: ml-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  train-eval-gate:
    name: Train, evaluate, gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch NAB dataset
        run: python -m scripts.download_nab

      - name: Train + evaluate + gate (fails if PR-AUC < floor)
        run: python -m evaluation.evaluate

      - name: Register best model (runs only if the gate passed)
        run: python -m training.register_best

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-metrics
          path: ml/artifacts/metrics.json
          if-no-files-found: ignore
