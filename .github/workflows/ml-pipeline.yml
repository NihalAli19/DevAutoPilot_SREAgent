name: ML Pipeline

# TODO(plan: Phase 1) — Implement the MLOps train -> evaluate -> gate -> register flow.
# Eval-metric gate must FAIL the pipeline (and block deploy) if metrics regress
# below the configured threshold. This stub only wires the stage structure.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"   # weekly retrain (Mondays 03:00 UTC)
  push:
    branches: [main, master]
    paths:
      - "ml/**"

jobs:
  ml:
    name: Train, evaluate, gate, register
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train
        run: echo "TODO(plan: Phase 1) python -m training.train_isolation_forest"

      - name: Evaluate
        run: echo "TODO(plan: Phase 1) python -m evaluation.evaluate"

      - name: Gate (fail if metrics regress below threshold)
        run: echo "TODO(plan: Phase 1) enforce PR-AUC / F1 gate; exit 1 on regression"

      - name: Register (MLflow / Azure ML)
        run: echo "TODO(plan: Phase 1) register model version on gate pass"
