# Pre-commit hooks for DevAutoPilot.
# Install once:  pip install pre-commit && pre-commit install
# Then ruff runs automatically on every commit.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint, with autofix.
      - id: ruff
        args: [--fix]
        files: ^(backend|ml)/
      # Format.
      - id: ruff-format
        files: ^(backend|ml)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]   # block accidental model/data blobs
      - id: check-merge-conflict
      - id: detect-private-key   # safety net against committing secrets
